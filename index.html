<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>Qian Yi Jie</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#f0f2f5;color:#333;padding:20px;line-height:1.6}
.container{max-width:780px;margin:0 auto;background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.08);overflow:hidden}
.header{background:linear-gradient(135deg,#2c3e50,#34495e);color:#fff;padding:30px;text-align:center}
.header h1{font-size:22px;margin-bottom:8px;letter-spacing:1px}
.header p{font-size:13px;opacity:0.85}
.info-bar{background:#f8f9fa;padding:15px 30px;display:flex;gap:20px;font-size:13px;border-bottom:1px solid #e9ecef;flex-wrap:wrap}
.info-bar label{color:#666}
.info-bar input{border:1px solid #ced4da;border-radius:4px;padding:4px 10px;font-size:13px;width:120px}
.progress-bar{background:#e9ecef;height:4px}
.progress-fill{background:#6c757d;height:100%;width:0;transition:width .3s ease}
.question-card{display:none;padding:25px 30px;border-bottom:1px solid #e9ecef;animation:fadeIn .25s ease}
.question-card.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.q-number{display:inline-block;background:#6c757d;color:#fff;font-size:12px;font-weight:600;padding:3px 12px;border-radius:20px;margin-bottom:12px}
.q-text{font-size:16px;font-weight:600;color:#2c3e50;margin-bottom:20px;line-height:1.6}
.options{display:flex;flex-direction:column;gap:10px}
.option-item{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border:2px solid #dee2e6;border-radius:10px;cursor:pointer;transition:all .2s ease}
.option-item:hover{border-color:#6c757d;background:#f8f9fa}
.option-item.selected{border-color:#495057;background:#f1f3f5;box-shadow:0 0 0 3px rgba(73,80,87,.12)}
.option-item input[type="radio"]{margin-top:3px;accent-color:#495057;width:18px;height:18px;flex-shrink:0}
.opt-text{font-size:14px;color:#495057;line-height:1.55}
.nav-bar{display:flex;justify-content:space-between;margin-top:28px;padding-top:20px;border-top:1px solid #e9ecef}
.nav-btn{padding:10px 28px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s ease}
.btn-prev{background:#e9ecef;color:#495057}
.btn-prev:hover{background:#dee2e6}
.btn-prev:disabled{opacity:.35;cursor:not-allowed}
.btn-next{background:#495057;color:#fff}
.btn-next:hover{background:#343a40}
.btn-submit{background:#495057;color:#fff;padding:12px 36px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer}
.btn-submit:hover{background:#343a40}
.thanks-page{display:none;padding:60px 30px;text-align:center}
.thanks-page.active{display:block}
.thanks-page h2{font-size:28px;color:#2c3e50;margin-bottom:16px}
.thanks-page p{font-size:15px;color:#6c757d;line-height:1.8}
.loading-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,.9);z-index:999;flex-direction:column;align-items:center;justify-content:center}
.loading-overlay.active{display:flex}
.spinner{width:40px;height:40px;border:3px solid #e9ecef;border-top-color:#495057;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{margin-top:16px;font-size:14px;color:#6c757d}

.start-area{text-align:center;padding:50px 30px 30px;animation:fadeIn .25s ease}
.start-area.hidden{display:none}
.start-title-v5{font-size:18px;font-weight:700;color:#2c3e50;margin-bottom:28px;letter-spacing:1px}
.btn-start{background:linear-gradient(135deg,#2c3e50,#34495e);color:#fff;padding:14px 48px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s ease;letter-spacing:2px}
.btn-start:hover{background:linear-gradient(135deg,#1a252f,#2c3e50);transform:translateY(-1px);box-shadow:0 4px 12px rgba(44,62,80,.25)}
.btn-start:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

</style>

<div><label id="lblDate"></label><input type="text" id="testDate" readonly></div>

<script>
(function(){
var U=QD.ui;
var DIMS_LABEL=QD.dim_labels;
var DIMS_LABEL_LOW=QD.dim_labels_low;
var SC_THRESH=QD.scoring.SC_THRESH_ARR;
var SC_MAX=QD.scoring.SC_MAX_ARR||[6,6,6,6,6,6,6,6,6,6];
var ND=DIMS_LABEL.length;

// Set UI text
document.title=U.title;
document.getElementById('hTitle').textContent=U.title;
document.getElementById('hSubtitle').textContent=U.subtitle;
document.getElementById('lblName').textContent=U.name_label;
document.getElementById('userName').placeholder=U.name_placeholder;
document.getElementById('lblDate').textContent=U.date_label;
document.getElementById('testDate').value=new Date().toLocaleDateString('zh-CN');
document.getElementById('thanksTitle').textContent=U.thanks_title;
document.getElementById('thanksText1').textContent=U.thanks_text;
document.getElementById('thanksText2').textContent=U.thanks_text2;
document.getElementById('loadingText').textContent=U.sending;

document.getElementById('btnStart').textContent=U.start_btn;


var Q=QD.questions;
var totalQ=Q.length, currentQ=0;
var quizStartTime=null, questionStartTime=null;
var questionTimes=new Array(totalQ).fill(0);
var questionFastFlags=new Array(totalQ).fill(false);

// Build quiz HTML
var h='';
for(var i=0;i<totalQ;i++){
h+='<div class="question-card'+(i===0?' active':'')+'" id="q'+i+'">';
h+='<span class="q-number">'+U.q_prefix+(i+1)+' / '+totalQ+U.q_suffix+'</span>';
h+='<div class="q-text">'+Q[i].q+'</div><div class="options">';
h+='<label class="option-item"><input type="radio" name="q'+i+'" data-letter="A" value="'+Q[i].va+'"><span class="opt-text">A&#xFF1A;'+Q[i].a+'</span></label>';
h+='<label class="option-item"><input type="radio" name="q'+i+'" data-letter="B" value="'+Q[i].vb+'"><span class="opt-text">B&#xFF1A;'+Q[i].b+'</span></label>';
h+='<label class="option-item"><input type="radio" name="q'+i+'" data-letter="C" value="'+Q[i].vc+'"><span class="opt-text">C&#xFF1A;'+Q[i].c+'</span></label>';
h+='</div><div class="nav-bar">';
h+='<button class="nav-btn btn-prev" '+(i===0?'disabled':'')+' onclick="go(-1)">'+U.prev_btn+'</button>';
h+=(i===totalQ-1?'<button class="btn-submit" onclick="submitQuiz()">'+U.submit_btn+'</button>':'<button class="nav-btn btn-next" onclick="go(1)">'+U.next_btn+'</button>');
h+='</div></div>';
}
document.getElementById('quizContainer').innerHTML=h;
document.getElementById('quizContainer').style.display='none';

// Attach click handlers
document.querySelectorAll('.option-item').forEach(function(el){
el.addEventListener('click',function(){
var s=this.parentElement.querySelectorAll('.option-item');
s.forEach(function(x){x.classList.remove('selected')});
this.classList.add('selected');
});
});

document.getElementById('userName').addEventListener('keydown',function(e){
if(e.key==='Enter'||e.keyCode===13){
e.preventDefault();
if(document.getElementById('quizContainer').style.display==='none'){
startQuiz();
}else{
var el=document.querySelector('.question-card.active .q-number');
if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
}
}
});



window.startQuiz=function(){
var nameVal=document.getElementById('userName').value.trim();
if(!nameVal){alert(U.name_required);return;}
document.getElementById('userName').readOnly=true;
document.getElementById('userName').style.background='#f8f9fa';
document.getElementById('userName').style.cursor='not-allowed';
document.getElementById('startArea').classList.add('hidden');
document.getElementById('quizContainer').style.display='block';
document.querySelector('.question-card.active').scrollIntoView({behavior:'smooth',block:'start'});
quizStartTime=Date.now();
questionStartTime=Date.now();
};

function getVal(i){var r=document.getElementsByName('q'+i);for(var j=0;j<r.length;j++)if(r[j].checked)return parseInt(r[j].value);return null;}
function getLetter(i){var r=document.getElementsByName('q'+i);for(var j=0;j<r.length;j++)if(r[j].checked)return r[j].dataset.letter;return null;}

window.go=function(d){
if(d>0 && getVal(currentQ)===null)return;
var n=currentQ+d;if(n<0||n>=totalQ)return;
if(questionStartTime){questionTimes[currentQ]=Math.round((Date.now()-questionStartTime)/1000);questionFastFlags[currentQ]=questionTimes[currentQ]<3;}
document.getElementById('q'+currentQ).classList.remove('active');
currentQ=n;
questionStartTime=Date.now();
document.getElementById('q'+currentQ).classList.add('active');
var a=0;for(var i=0;i<totalQ;i++)if(getVal(i)!==null)a++;
document.getElementById('progressFill').style.width=(a/totalQ*100)+'%';
document.querySelector('.question-card.active').scrollIntoView({behavior:'smooth',block:'start'});
};

window.submitQuiz=function(){
var miss=[];
for(var i=0;i<totalQ;i++)if(getVal(i)===null)miss.push(i+1);
if(miss.length>0){alert(U.missing||'请完成所有题目后再提交（未答：第'+miss.join(',')+'题）');return;}
var name=document.getElementById('userName').value||U.unknown_name;
document.getElementById('loadingOverlay').classList.add('active');

// Build dimScores dynamically
var dimScores=new Array(ND).fill(0);
for(var i=0;i<totalQ;i++){dimScores[Q[i].dim]+=getVal(i);}

// Calculate timing stats
questionTimes[currentQ]=Math.round((Date.now()-questionStartTime)/1000);
questionFastFlags[currentQ]=questionTimes[currentQ]<3;
var totalTime=Math.round((Date.now()-quizStartTime)/1000);
var avgTime=Math.round(totalTime/totalQ);
var fastCount=questionFastFlags.filter(function(x){return x;}).length;
var fastRate=Math.round(fastCount/totalQ*100);
var totalMin=Math.floor(totalTime/60);
var totalSec=totalTime%60;
var timeStr=totalMin+'分'+totalSec+'秒';
var isSerious=!(fastRate>30 || avgTime<5);

var dimPct=[],dimOk=[];
for(var d=0;d<ND;d++){
dimPct[d]=Math.round(dimScores[d]/SC_MAX[d]*100);
dimOk[d]=dimScores[d]>=SC_THRESH[d];
}

var hc=dimOk.filter(function(x){return x;}).length;
var curType=QD.types[0];
for(var t=0;t<QD.types.length;t++){if(hc>=QD.types[t].min){curType=QD.types[t];break;}}
if(!curType)curType=QD.types[QD.types.length-1];

var codeChars=curType.code;
var dt=new Date().toLocaleDateString('zh-CN');

// Build report HTML
var rep='<div style="font-family:Microsoft YaHei,PingFang SC,sans-serif;max-width:720px;margin:0 auto;color:#333">';
rep+='<div style="background:linear-gradient(135deg,#2c3e50,#34495e);color:#fff;padding:28px;text-align:center;border-radius:8px 8px 0 0">';
rep+='<h2 style="margin:0 0 8px;font-size:20px">'+U.report_title+'</h2>';
rep+='<p style="margin:0;font-size:13px;opacity:.85">'+name+' | '+dt+'</p></div>';
rep+='<div style="border:1px solid #e9ecef;border-top:0;padding:24px;border-radius:0 0 8px 8px">';

// --- Section 1: 人格类型概览 ---
rep+='<div style="text-align:center;font-size:44px;font-weight:800;color:#495057;letter-spacing:6px;margin:10px 0">'+codeChars+'</div>';
rep+='<div style="text-align:center;font-size:16px;font-weight:700;color:#2c3e50;margin-bottom:6px">'+curType.name+'</div>';
rep+='<div style="text-align:center;font-size:13px;color:#6c757d;margin-bottom:10px">'+curType.desc+'</div>';

// --- Timing overview card ---
rep+='<div style="display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-bottom:16px">';
rep+='<div style="background:'+(isSerious?'#e8f5e9':'#fff3e0')+';border-radius:8px;padding:12px 20px;text-align:center;min-width:120px"><div style="font-size:11px;color:#6c757d">总用时</div><div style="font-size:18px;font-weight:700;color:#2c3e50;margin-top:4px">'+timeStr+'</div></div>';
rep+='<div style="background:#f8f9fa;border-radius:8px;padding:12px 20px;text-align:center;min-width:120px"><div style="font-size:11px;color:#6c757d">每题均时</div><div style="font-size:18px;font-weight:700;color:#2c3e50;margin-top:4px">'+avgTime+'秒</div></div>';
rep+='<div style="background:'+(isSerious?'#e8f5e9':'#fff3e0')+';border-radius:8px;padding:12px 20px;text-align:center;min-width:130px"><div style="font-size:11px;color:#6c757d">秒答题目（&lt;3秒）</div><div style="font-size:18px;font-weight:700;color:'+(fastRate>30?'#f44336':'#4CAF50')+';margin-top:4px">'+fastCount+'/'+totalQ+' ('+fastRate+'%)</div></div>';
rep+='<div style="background:'+(isSerious?'#e8f5e9':'#fff3e0')+';border-radius:8px;padding:12px 20px;text-align:center;min-width:120px"><div style="font-size:11px;color:#6c757d">认真度</div><div style="font-size:18px;font-weight:700;margin-top:4px;color:'+(isSerious?'#4CAF50':'#f44336')+'">'+(isSerious?'&#x2705; 认真作答':(fastRate>50?'&#x26A0;&#xFE0F; 疑似敷衍':'&#x26A0;&#xFE0F; 注意力分散'))+'</div></div>';
rep+='</div>';
if(!isSerious){
rep+='<div style="background:#fff3e0;border-left:4px solid #ff9800;padding:10px 16px;border-radius:4px;margin-bottom:16px;font-size:12px;color:#e65100"><strong>&#x26A0;&#xFE0F; 注意：</strong>该候选人答题用时异常偏短，'+fastCount+'道题在3秒内完成（占比'+fastRate+'%），';
if(fastRate>50)rep+='极可能存在敷衍作答行为，建议将此报告结论作为参考而非决策依据，必要时安排线下重测或面试复核。';
else rep+='可能存在注意力不集中或仓促作答的情况，部分维度得分可能无法完全反映真实水平，建议结合面试综合评估。';
rep+='</div>';
}

// --- Section 2: 维度得分表 ---
rep+='<div style="background:#f8f9fa;border-radius:8px;padding:18px;margin-bottom:16px"><h4 style="margin:0 0 14px;font-size:14px;color:#2c3e50;border-bottom:1px solid #e9ecef;padding-bottom:8px">'+U.report_dim_title+'</h4>';
rep+='<table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr style="background:#dee2e6"><th style="padding:8px 12px;text-align:left;border:1px solid #ced4da">'+U.report_dim_col+'</th><th style="padding:8px 12px;text-align:center;border:1px solid #ced4da;width:80px">得分</th><th style="padding:8px 12px;text-align:center;border:1px solid #ced4da;width:100px">状态</th></tr></thead><tbody>';
for(var d=0;d<ND;d++){
var barW=dimPct[d];
var barColor=barW>=80?'#4CAF50':(barW>=60?'#8BC34A':(barW>=40?'#FFC107':'#FF5722'));
rep+='<tr><td style="padding:8px 12px;border:1px solid #ced4da;font-weight:600">'+DIMS_LABEL[d]+'</td>';
rep+='<td style="padding:8px 12px;border:1px solid #ced4da;text-align:center;font-weight:700;color:'+barColor+'">'+dimScores[d]+'/'+SC_MAX[d]+'</td>';
rep+='<td style="padding:8px 12px;border:1px solid #ced4da;text-align:center;font-size:11px"><span style="display:inline-block;padding:2px 10px;border-radius:12px;font-weight:600;'+(dimOk[d]?'background:#e8f5e9;color:#2e7d32':'background:#fff3e0;color:#e65100')+'">'+(dimOk[d]?DIMS_LABEL[d]:DIMS_LABEL_LOW[d])+'</span></td></tr>';
}
rep+='</tbody></table></div>';

// --- Section 3: 核心特征（精简5-8条）---
var coreTraits=[];
for(var d=0;d<ND;d++){
var tt=dimOk[d]?QD.traits_high[d]:QD.traits_mid[d];
if(dimPct[d]>=80){
// 优势维度：取第1条
if(tt.length>0)coreTraits.push({t:tt[0],type:'high'});
}else if(dimPct[d]<=40){
// 短板维度：取第1条
if(tt.length>0)coreTraits.push({t:tt[0],type:'low'});
}
}
// 如果核心特征太少，补充得分居中但接近边界的
if(coreTraits.length<5){
for(var d=0;d<ND;d++){
var tt2=dimOk[d]?QD.traits_high[d]:QD.traits_mid[d];
if(dimPct[d]>40 && dimPct[d]<80 && coreTraits.length<8){
var already=false;
for(var ci=0;ci<coreTraits.length;ci++){if(coreTraits[ci].t===tt2[0]){already=true;break;}}
if(!already)coreTraits.push({t:tt2[0],type:dimOk[d]?'high':'mid'});
}
}
}
// 限制最多8条
if(coreTraits.length>8)coreTraits=coreTraits.slice(0,8);
rep+='<div style="background:#f8f9fa;border-radius:8px;padding:18px;margin-bottom:16px"><h4 style="margin:0 0 14px;font-size:14px;color:#2c3e50;border-bottom:1px solid #e9ecef;padding-bottom:8px">核心特征</h4>';
rep+='<div style="margin-bottom:10px;font-size:11px;color:#6c757d">&#x1F7E2; 优势维度（得分&ge;80%） | &#x26AB; 中等维度（得分41%-79%） | &#x1F534; 待提升维度（得分&le;40%）</div>';
rep+='<ul style="margin:0;padding:0 0 0 18px;font-size:13px;line-height:1.8;color:#495057">';
for(var ci=0;ci<coreTraits.length;ci++){
var icon=coreTraits[ci].type==='high'?'&#x1F7E2; ':(coreTraits[ci].type==='low'?'&#x1F534; ':'&#x26AB; ');
rep+='<li>'+icon+coreTraits[ci].t+'</li>';
}
rep+='</ul></div>';

// --- Section 4: 综合评语 ---
var strongDims=[],weakDims=[];
for(var d=0;d<ND;d++){
if(dimPct[d]>=80)strongDims.push(DIMS_LABEL[d]);
if(dimPct[d]<=40)weakDims.push(DIMS_LABEL[d]);
}
var evalText='';
if(hc>=7){
evalText='该候选人在';
if(strongDims.length>0){evalText+=strongDims.slice(0,3).join('、')+'等维度表现突出，综合素质优秀。';}
else{evalText+='多数维度上表现良好，整体素质优秀。';}
evalText+='与岗位需求高度匹配，是值得重点考虑的优秀人选。';
if(weakDims.length>0){evalText+='建议在'+weakDims.join('、')+'等维度上持续精进，追求更全面发展。';}
}else if(hc>=4){
evalText='该候选人在';
if(strongDims.length>0){evalText+=strongDims.slice(0,3).join('、')+'等维度表现较好，具备良好的职业基础。';}
else{evalText+='部分维度上表现达标，整体基础尚可。';}
if(weakDims.length>0){evalText+='在'+weakDims.join('、')+'等维度上仍有提升空间，建议通过工作实践和针对性培训逐步强化薄弱环节。';}
else{evalText+='建议在现有基础上进一步发挥优势，同时关注各维度的均衡发展。';}
}else{
evalText='该候选人目前在';
if(strongDims.length>0){evalText+=strongDims.join('、')+'等维度有一定基础，';}
if(weakDims.length>0){evalText+=weakDims.join('、')+'等多数维度需要重点提升。';}
else{evalText+='各项维度均有较大提升空间。';}
evalText+='建议制定系统的培养计划，在实际工作中从基础开始逐步积累，关注个人成长与岗位要求的匹配度。';
}
